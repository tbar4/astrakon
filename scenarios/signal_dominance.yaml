      leo_nodes: 15
      meo_nodes: 8
      geo_nodes: 3
      sda_sensors: 14
      relay_nodes: 4
      launch_capacity: 3

  - faction_id: eu_galileo
    name: "EU Galileo Consortium"
    archetype: commercial_broker
    agent_type: is_mcts
    budget_per_turn: 70
    coalition_id: nato_gps
    coalition_loyalty: 0.7
    starting_assets:
      leo_nodes: 10
      meo_nodes: 10
      geo_nodes: 2
      sda_sensors: 8
      launch_capacity: 3

  - faction_id: cnsa_beidou
    name: "CNSA BeiDou Command"
