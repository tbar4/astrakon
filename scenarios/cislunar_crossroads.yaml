name: "Cislunar Crossroads"
description: "Competition for lunar gateway access and cislunar resource rights, 2035"
turns: 12
turn_represents: "3 months"

coalitions:
  artemis:
    member_ids: [nasa_ussf, esa_consortium]
    shared_intel: true
    hegemony_pool: true
  ascent:
    member_ids: [cnsa_pla, roscosmos]
    shared_intel: true
    hegemony_pool: false

factions:
  - faction_id: nasa_ussf
    name: "NASA/USSF Artemis Command"
    archetype: mahanian
    agent_type: "human+advisor"
    budget_per_turn: 120
    coalition_id: artemis
    coalition_loyalty: 0.85
    starting_assets:
      leo_nodes: 20
      meo_nodes: 6
      geo_nodes: 3
      cislunar_nodes: 2
      sda_sensors: 14
      relay_nodes: 3
      launch_capacity: 4

  - faction_id: esa_consortium
    name: "ESA Commercial Consortium"
    archetype: commercial_broker
    agent_type: is_mcts
    budget_per_turn: 80
    coalition_id: artemis
    coalition_loyalty: 0.65
    starting_assets:
      leo_nodes: 22
      meo_nodes: 4
      geo_nodes: 2
      cislunar_nodes: 1
      sda_sensors: 8
      launch_capacity: 3

  - faction_id: cnsa_pla
    name: "CNSA/PLA Cislunar Command"
    archetype: gray_zone
    agent_type: is_mcts
    budget_per_turn: 100
    coalition_id: ascent
    coalition_loyalty: 0.9
    starting_assets:
      leo_nodes: 28
      meo_nodes: 8
      geo_nodes: 4
      cislunar_nodes: 3
      asat_kinetic: 4
      asat_deniable: 6
      sda_sensors: 10
      launch_capacity: 3

  - faction_id: roscosmos
    name: "Roscosmos Space Forces"
    archetype: rogue_accelerationist
    agent_type: is_mcts
    budget_per_turn: 35
    coalition_id: ascent
    coalition_loyalty: 0.55
    starting_assets:
      leo_nodes: 12
      meo_nodes: 2
      cislunar_nodes: 1
      asat_kinetic: 5
      asat_deniable: 3
      ew_jammers: 5
      sda_sensors: 4
      launch_capacity: 1

victory:
  coalition_orbital_dominance: 0.65
  individual_conditions_required: true
  individual_conditions:
    nasa_ussf:
      military_deterrence_score: 50
    esa_consortium:
      commercial_market_share: 0.30
    cnsa_pla:
      orbital_dominance_score: 0.42
    roscosmos:
      disruption_score: 25

crisis_events:
  library: default_2030
